<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Günlerimiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            font-size: 1.8rem;
        }

        /* Başlık Renkleri */
        .baslik-gecen { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
        .baslik-kalan { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.5); margin-top: 50px; }
        .baslik-nikah { color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); margin-top: 50px; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        .kutu {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            min-width: 140px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .kutu:hover {
            transform: translateY(-5px);
        }

        /* Çerçeve renkleri */
        .border-gecen:hover { border-color: #00ffcc; }
        .border-kalan:hover { border-color: #ff3366; }
        .border-nikah:hover { border-color: #ffcc00; }

        .sayi {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .etiket {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; width: 100%; }
            .kutu { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <h1 class="baslik-gecen" id="gecenBaslik">13.02.2015'TEN BERİ</h1>
    
    <div class="container">
        <div class="kutu border-gecen">
            <span class="sayi" id="toplamYil">0</span>
            <span class="etiket">YIL</span>
        </div>
        <div class="kutu border-gecen">
            <span class="sayi" id="toplamAy">0</span>
            <span class="etiket">AY</span>
        </div>
        <div class="kutu border-gecen">
            <span class="sayi" id="toplamGun">0</span>
            <span class="etiket">GÜN</span>
        </div>
        <div class="kutu border-gecen">
            <span class="sayi" id="toplamSaat">0</span>
            <span class="etiket">SAAT</span>
        </div>
        <div class="kutu border-gecen">
            <span class="sayi" id="toplamDakika">0</span>
            <span class="etiket">DAKİKA</span>
        </div>
        <div class="kutu border-gecen">
            <span class="sayi" id="toplamSaniye">0</span>
            <span class="etiket">SANİYE</span>
        </div>
    </div>

    <h1 class="baslik-kalan" id="nisanBaslik">NİŞANA KALAN SÜRE (13.02.2026)</h1>

    <div class="container" id="nisanKutulari">
        <div class="kutu border-kalan">
            <span class="sayi" id="kalanYil">0</span>
            <span class="etiket">YIL</span>
        </div>
        <div class="kutu border-kalan">
            <span class="sayi" id="kalanAy">0</span>
            <span class="etiket">AY</span>
        </div>
        <div class="kutu border-kalan">
            <span class="sayi" id="kalanGun">0</span>
            <span class="etiket">GÜN</span>
        </div>
        <div class="kutu border-kalan">
            <span class="sayi" id="kalanSaat">0</span>
            <span class="etiket">SAAT</span>
        </div>
        <div class="kutu border-kalan">
            <span class="sayi" id="kalanDakika">0</span>
            <span class="etiket">DAKİKA</span>
        </div>
        <div class="kutu border-kalan">
            <span class="sayi" id="kalanSaniye">0</span>
            <span class="etiket">SANİYE</span>
        </div>
    </div>

    <h1 class="baslik-nikah" id="nikahBaslik">NİKAHA KALAN SÜRE (23.08.2026 - 13:15)</h1>

    <div class="container" id="nikahKutulari">
        <div class="kutu border-nikah" id="nikahAyKutusu">
            <span class="sayi" id="nikahAy">0</span>
            <span class="etiket" id="nikahAyEtiket">AY</span>
        </div>
        <div class="kutu border-nikah">
            <span class="sayi" id="nikahGun">0</span>
            <span class="etiket" id="nikahGunEtiket">GÜN</span>
        </div>
        <div class="kutu border-nikah">
            <span class="sayi" id="nikahSaat">0</span>
            <span class="etiket" id="nikahSaatEtiket">SAAT</span>
        </div>
        <div class="kutu border-nikah">
            <span class="sayi" id="nikahDakika">0</span>
            <span class="etiket" id="nikahDakikaEtiket">DAKİKA</span>
        </div>
        <div class="kutu border-nikah">
            <span class="sayi" id="nikahSaniye">0</span>
            <span class="etiket" id="nikahSaniyeEtiket">SANİYE</span>
        </div>
    </div>

    <script>
        // Hedef Tarihler
        const tarihGecmis = new Date(2015, 1, 13, 0, 0, 0);
        const tarihNisan = new Date(2026, 1, 13, 0, 0, 0);
        const tarihNikah = new Date(2026, 7, 23, 13, 15, 0);

        // İki tarih arasındaki farkı detaylı bulan fonksiyon
        function tarihFarkiniHesapla(baslangic, bitis) {
            let nYil = bitis.getFullYear() - baslangic.getFullYear();
            let nAy = bitis.getMonth() - baslangic.getMonth();
            let nGun = bitis.getDate() - baslangic.getDate();
            let nSaat = bitis.getHours() - baslangic.getHours();
            let nDakika = bitis.getMinutes() - baslangic.getMinutes();
            let nSaniye = bitis.getSeconds() - baslangic.getSeconds();

            if (nSaniye < 0) { nSaniye += 60; nDakika--; }
            if (nDakika < 0) { nDakika += 60; nSaat--; }
            if (nSaat < 0) { nSaat += 24; nGun--; }
            if (nGun < 0) {
                const gecenAy = new Date(bitis.getFullYear(), bitis.getMonth(), 0);
                nGun += gecenAy.getDate();
                nAy--;
            }
            if (nAy < 0) { nAy += 12; nYil--; }

            return { yil: nYil, ay: nAy, gun: nGun, saat: nSaat, dakika: nDakika, saniye: nSaniye };
        }

        function sayaciGuncelle() {
            const simdi = new Date();

            // 1. GEÇMİŞTEN BUGÜNE HESAP
            const gecenSure = tarihFarkiniHesapla(tarihGecmis, simdi);
            document.getElementById("toplamYil").innerText = gecenSure.yil;
            document.getElementById("toplamAy").innerText = gecenSure.ay;
            document.getElementById("toplamGun").innerText = gecenSure.gun;
            document.getElementById("toplamSaat").innerText = gecenSure.saat;
            document.getElementById("toplamDakika").innerText = gecenSure.dakika;
            document.getElementById("toplamSaniye").innerText = gecenSure.saniye;

            // 2. NİŞAN GERİ SAYIM / GİZLEME
            if (tarihNisan.getTime() > simdi.getTime()) {
                const nisanKalan = tarihFarkiniHesapla(simdi, tarihNisan);
                document.getElementById("kalanYil").innerText = nisanKalan.yil;
                document.getElementById("kalanAy").innerText = nisanKalan.ay;
                document.getElementById("kalanGun").innerText = nisanKalan.gun;
                document.getElementById("kalanSaat").innerText = nisanKalan.saat;
                document.getElementById("kalanDakika").innerText = nisanKalan.dakika;
                document.getElementById("kalanSaniye").innerText = nisanKalan.saniye;
            } else {
                document.getElementById("nisanBaslik").innerText = "13.02.2026 NİŞANLANDIK! 💍🎉";
                document.getElementById("nisanKutulari").style.display = "none";
            }

            // 3. NİKAH GERİ SAYIM VEYA EVLİLİK İLERİ SAYIM MANTIĞI
            if (tarihNikah.getTime() > simdi.getTime()) {
                // Nikah henüz gelmedi, geri sayım yap
                const nikahKalan = tarihFarkiniHesapla(simdi, tarihNikah);
                
                // Geri sayımda YIL kutusu gizli kalmalı
                document.getElementById("nikahAyKutusu").style.display = "block"; 
                document.getElementById("nikahAyEtiket").innerText = "AY";
                
                document.getElementById("nikahAy").innerText = nikahKalan.ay;
                document.getElementById("nikahGun").innerText = nikahKalan.gun;
                document.getElementById("nikahSaat").innerText = nikahKalan.saat;
                document.getElementById("nikahDakika").innerText = nikahKalan.dakika;
                document.getElementById("nikahSaniye").innerText = nikahKalan.saniye;
            } else {
                // NİKAH GÜNÜ GEÇTİ -> EVLENDİK MODU
                document.getElementById("nikahBaslik").innerText = "23.08.2026 EVLENDİK! 👑🎉";
                
                // Evlilikten sonra ne kadar süre geçtiğini hesapla
                const evlilikGecen = tarihFarkiniHesapla(tarihNikah, simdi);
                
                // Ay kutusunu YIL kutusuna dönüştürerek dinamik alan açıyoruz
                document.getElementById("nikahAyKutusu").style.display = "block";
                document.getElementById("nikahAy").innerText = evlilikGecen.yil;
                document.getElementById("nikahAyEtiket").innerText = "YILDIR";
                
                // Diğer kutuları "...DIR / ...TİR" takılarına uyarla
                document.getElementById("nikahGun").innerText = evlilikGecen.ay;
                document.getElementById("nikahGunEtiket").innerText = "AYDIR";
                
                document.getElementById("nikahSaat").innerText = evlilikGecen.gun;
                document.getElementById("nikahSaatEtiket").innerText = "GÜNDÜR";
                
                document.getElementById("nikahDakika").innerText = evlilikGecen.saat;
                document.getElementById("nikahDakikaEtiket").innerText = "SAATTİR";
                
                document.getElementById("nikahSaniye").innerText = evlilikGecen.dakika;
                document.getElementById("nikahSaniyeEtiket").innerText = "DAKİKADIR";
                
                // Not: Saniyeyi de görmek istersen ek bir kutu mantığı gerekir ama 5 kutu simetriyi bozmaz. 
                // Bu dizilim: YILDIR | AYDIR | GÜNDÜR | SAATTİR | DAKİKADIR şeklinde akacaktır.
            }
        }

        setInterval(sayaciGuncelle, 1000);
        sayaciGuncelle();
    </script>

</body>
</html>
